<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACK THE PLANET</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- HACK BUTTON — inline styles to guarantee visibility -->
    <button id="hack-btn" style="
        position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
        z-index:99999; background:rgba(6,10,15,0.95); border:2px solid #00ff41;
        color:#00ff41; font-family:'Share Tech Mono',monospace; font-size:22px;
        letter-spacing:8px; padding:22px 55px; cursor:pointer;
        text-shadow:0 0 15px #00ff41,0 0 30px rgba(0,255,65,0.3);
        box-shadow:0 0 25px rgba(0,255,65,0.2),0 0 50px rgba(0,255,65,0.1),inset 0 0 30px rgba(0,255,65,0.05);
    ">HACK THE PLANET<span style="display:block;font-size:9px;letter-spacing:3px;color:rgba(0,255,65,0.5);margin-top:8px;text-shadow:none;">CLICK TO INITIATE BREACH</span></button>

    <div class="status-bar">
        <div class="left">
            <span class="title">HACKTHEPLANET v3.2</span>
            <span class="status-indicator"><span class="status-dot"></span> CONNECTED</span>
            <span class="status-indicator"><span class="status-dot amber"></span> ENCRYPTION ACTIVE</span>
        </div>
        <div class="right">
            <span id="uptime">UPTIME: 00:00:00</span>
            <span id="clock"></span>
        </div>
    </div>
    <div class="dashboard">
        <div class="panel" id="matrix-panel">
            <canvas id="matrix-canvas"></canvas>
        </div>
        <div class="panel" id="hex-panel">
            <div class="panel-header"><span class="dot"></span> HEX DUMP</div>
            <div class="panel-content" id="hex-content"></div>
        </div>
        <div class="panel" id="network-panel">
            <div class="panel-header"><span class="dot"></span> NETWORK TOPOLOGY</div>
            <canvas id="network-canvas"></canvas>
        </div>
        <div class="panel" id="terminal-panel">
            <div class="panel-header"><span class="dot"></span> TERMINAL</div>
            <div class="panel-content" id="terminal-content"></div>
        </div>
        <div class="panel" id="map-panel">
            <div class="panel-header"><span class="dot"></span> GLOBAL OPERATIONS</div>
            <canvas id="map-canvas"></canvas>
        </div>
        <div class="panel" id="alert-panel">
            <div class="panel-header"><span class="dot"></span> SYSTEM ALERTS</div>
            <div class="panel-content" id="alert-content"></div>
        </div>
        <div class="panel" id="progress-panel">
            <div class="panel-header"><span class="dot"></span> ACTIVE OPERATIONS</div>
            <div class="panel-content" id="progress-content"></div>
        </div>
    </div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div id="alert-flash"></div>
    <button id="audio-toggle" title="Toggle sound">&#x1f507;</button>
    <script type="module" src="/js/main.js"></script>
</body>
</html>
